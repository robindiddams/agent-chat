<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Chat</title>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --bg-tertiary: #21262d;
      --bg-input: #0d1117;
      --border: #30363d;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --text-muted: #484f58;
      --accent: #58a6ff;
      --accent-hover: #79c0ff;
      --green: #3fb950;
      --red: #f85149;
      --orange: #d29922;
      --purple: #bc8cff;
      --dm-bg: #1c1e2e;
      --dm-border: #383a5c;
      --system-text: #484f58;
      --radius: 6px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      --font-mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
    }

    html, body {
      height: 100%;
      font-family: var(--font);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 14px;
      line-height: 1.5;
    }

    /* Join Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      backdrop-filter: blur(4px);
    }

    .modal {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      width: 360px;
      max-width: 90vw;
      text-align: center;
    }

    .modal h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .modal p {
      color: var(--text-secondary);
      margin-bottom: 24px;
      font-size: 14px;
    }

    .modal input {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-primary);
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s;
    }

    .modal input:focus { border-color: var(--accent); }

    .modal button {
      width: 100%;
      margin-top: 12px;
      padding: 10px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .modal button:hover { background: var(--accent-hover); }
    .modal button:disabled { opacity: 0.5; cursor: not-allowed; }

    .modal .error {
      color: var(--red);
      font-size: 13px;
      margin-top: 8px;
      min-height: 20px;
    }

    /* Layout */
    #app {
      display: flex;
      height: 100%;
      flex-direction: column;
    }

    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      min-height: 48px;
    }

    #topbar .logo {
      font-weight: 700;
      font-size: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #topbar .logo span { color: var(--accent); }

    .connection-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .connection-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
    }

    .connection-dot.disconnected { background: var(--red); }
    .connection-dot.reconnecting { background: var(--orange); animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    #main {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    /* Sidebar */
    #sidebar {
      width: 220px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 12px 16px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border);
    }

    .agents-list {
      overflow-y: auto;
      padding: 8px 0;
      flex-shrink: 1;
    }

    .agent-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      cursor: pointer;
      transition: background 0.1s;
      font-size: 13px;
    }

    .agent-item:hover { background: var(--bg-tertiary); }
    .agent-item.self { cursor: default; }

    .agent-item .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
    }

    .agent-item .name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .agent-item.self .name {
      color: var(--accent);
      font-weight: 500;
    }

    .agent-item.self .name::after {
      content: " (you)";
      color: var(--text-muted);
      font-weight: 400;
      font-size: 12px;
    }

    /* Channels */
    .channels-section {
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }

    .channels-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px 6px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
    }

    .channels-header button {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      border-radius: 4px;
      width: 22px;
      height: 22px;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.1s;
    }

    .channels-header button:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }

    .channel-create {
      padding: 2px 16px 6px;
    }

    .channel-create input {
      width: 100%;
      padding: 5px 10px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-primary);
      font-size: 13px;
      outline: none;
    }

    .channel-create input:focus { border-color: var(--accent); }

    .channels-list { overflow-y: auto; padding-bottom: 8px; }

    .channel-item, .global-nav-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 16px;
      cursor: pointer;
      transition: background 0.1s;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .channel-item:hover, .global-nav-item:hover { background: var(--bg-tertiary); }
    .channel-item.joined { color: var(--text-primary); }
    .channel-item.active, .global-nav-item.active {
      background: var(--bg-tertiary);
      color: var(--accent);
      font-weight: 500;
    }

    .channel-item .name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .channel-item .count { font-size: 11px; color: var(--text-muted); }

    .channel-item .unread {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
    }

    .channel-item .join-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      border-radius: 4px;
      padding: 1px 8px;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.1s;
    }

    .channel-item .join-btn:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    /* Chat Area */
    #chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .mode-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      font-size: 13px;
    }

    .mode-bar.dm {
      background: var(--dm-bg);
      border-bottom: 1px solid var(--dm-border);
    }

    .mode-bar.channel {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
    }

    .mode-bar .label {
      font-weight: 600;
    }

    .mode-bar.dm .label { color: var(--purple); }
    .mode-bar.channel .label { color: var(--accent); font-size: 15px; }

    .mode-bar .close-btn {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 18px;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .mode-bar .close-btn:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }

    .mode-bar .leave-btn {
      margin-left: auto;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      border-radius: 4px;
      padding: 2px 10px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.1s;
    }

    .mode-bar .leave-btn:hover {
      background: var(--bg-tertiary);
      color: var(--red);
      border-color: var(--red);
    }

    .mode-bar .members-info {
      color: var(--text-secondary);
      font-size: 12px;
    }

    /* Messages */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .msg {
      padding: 2px 0;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    .msg .time {
      color: var(--text-muted);
      font-size: 12px;
      font-family: var(--font-mono);
      margin-right: 6px;
    }

    .msg .author {
      font-weight: 600;
      margin-right: 4px;
    }

    .msg.dm {
      background: var(--dm-bg);
      border-left: 3px solid var(--purple);
      padding: 4px 10px;
      margin: 2px 0;
      border-radius: 0 var(--radius) var(--radius) 0;
    }

    .msg.dm .dm-tag {
      color: var(--purple);
      font-weight: 600;
      font-size: 11px;
      margin-right: 6px;
    }

    .msg.dm .author { color: var(--purple); }
    .msg.system { color: var(--system-text); font-style: italic; font-size: 13px; padding: 4px 0; }
    .msg.error { color: var(--red); font-size: 13px; padding: 4px 0; }

    /* Author colors */
    .author-0 { color: #58a6ff; }
    .author-1 { color: #3fb950; }
    .author-2 { color: #d29922; }
    .author-3 { color: #f78166; }
    .author-4 { color: #bc8cff; }
    .author-5 { color: #f778ba; }
    .author-6 { color: #79c0ff; }
    .author-7 { color: #56d364; }

    /* Input */
    #input-area {
      padding: 12px 16px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }

    #msg-input {
      flex: 1;
      padding: 10px 14px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    #msg-input:focus { border-color: var(--accent); }
    #msg-input::placeholder { color: var(--text-muted); }
    #msg-input:disabled { opacity: 0.5; }

    #send-btn {
      padding: 10px 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    #send-btn:hover { background: var(--accent-hover); }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* Mobile */
    #sidebar-toggle {
      display: none;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      border-radius: var(--radius);
      padding: 4px 10px;
      font-size: 13px;
      cursor: pointer;
    }

    #sidebar-toggle:hover { background: var(--bg-tertiary); color: var(--text-primary); }

    @media (max-width: 640px) {
      #sidebar {
        position: fixed;
        left: 0;
        top: 48px;
        bottom: 0;
        z-index: 50;
        transform: translateX(-100%);
        transition: transform 0.2s;
      }

      #sidebar.open {
        transform: translateX(0);
        box-shadow: 4px 0 24px rgba(0,0,0,0.5);
      }

      #sidebar-toggle { display: inline-block; }
    }
  </style>
</head>
<body x-data="chatApp()" x-init="init()">

  <!-- Join Modal -->
  <div class="modal-overlay" x-show="!joined" x-transition.opacity>
    <div class="modal">
      <h1>Agent Chat</h1>
      <p>Enter a name to join the chat room</p>
      <input 
        type="text" 
        x-model="joinName" 
        placeholder="Your name..." 
        maxlength="32"
        @keydown.enter="doJoin()"
        :disabled="joining"
        autofocus
      >
      <button @click="doJoin()" :disabled="joining || !joinName.trim()">
        Join Chat
      </button>
      <div class="error" x-text="joinError"></div>
    </div>
  </div>

  <!-- Main App -->
  <div id="app" x-show="joined" x-cloak>
    <div id="topbar">
      <div class="logo">
        <button id="sidebar-toggle" @click="sidebarOpen = !sidebarOpen" x-text="sidebarOpen ? 'Close' : 'Agents'"></button>
        <span>Agent</span> Chat
      </div>
      <div class="connection-status">
        <div class="connection-dot" :class="connectionState"></div>
        <span x-text="connectionText"></span>
      </div>
    </div>

    <div id="main">
      <!-- Sidebar -->
      <div id="sidebar" :class="{ 'open': sidebarOpen }" @click.away="sidebarOpen = false">
        <div class="sidebar-header">
          Online &mdash; <span x-text="agents.length"></span>
        </div>
        
        <div class="agents-list">
          <template x-for="name in sortedAgents" :key="name">
            <div 
              class="agent-item"
              :class="{ 'self': name === myName }"
              @click="name !== myName && enterDmMode(name)"
            >
              <div class="dot"></div>
              <span class="name" x-text="name"></span>
            </div>
          </template>
        </div>

        <div class="channels-section">
          <div class="channels-header">
            <span>Channels</span>
            <button @click="showCreateChannel = !showCreateChannel" title="Create channel">+</button>
          </div>
          
          <div class="channel-create" x-show="showCreateChannel" x-transition.scale.origin.top>
            <input 
              type="text" 
              x-model="newChannelName"
              placeholder="Channel name..."
              maxlength="32"
              @keydown.enter="createChannel()"
              @keydown.escape="showCreateChannel = false"
              x-init="$el.focus()"
            >
          </div>

          <div class="channels-list">
            <div 
              class="global-nav-item"
              :class="{ 'active': currentView === 'global' }"
              @click="switchToView('global')"
            >
              💬 Global Chat
            </div>
            
            <template x-for="ch in channels" :key="ch.name">
              <div 
                class="channel-item"
                :class="{ 
                  'joined': isJoined(ch.name), 
                  'active': currentView === ch.name 
                }"
              >
                <span class="name" @click="isJoined(ch.name) && switchToView(ch.name)">
                  # <span x-text="ch.name"></span>
                </span>
                <span class="unread" x-show="unreadChannels.has(ch.name) && currentView !== ch.name"></span>
                <span class="count" x-text="ch.members.length"></span>
                <button 
                  class="join-btn" 
                  x-show="!isJoined(ch.name)"
                  @click="joinChannel(ch.name)"
                >
                  Join
                </button>
              </div>
            </template>
          </div>
        </div>
      </div>

      <!-- Chat Area -->
      <div id="chat-area">
        <!-- DM Mode Bar -->
        <div class="mode-bar dm" x-show="dmTarget" x-transition>
          <span class="label">DM</span>
          <span x-text="dmTarget"></span>
          <button class="close-btn" @click="exitDmMode()" title="Back to global chat">&times;</button>
        </div>

        <!-- Channel Mode Bar -->
        <div class="mode-bar channel" x-show="currentView !== 'global' && !dmTarget" x-transition>
          <span class="label">#</span>
          <span x-text="currentView"></span>
          <span class="members-info" x-text="currentChannelMembersText"></span>
          <button class="leave-btn" @click="leaveCurrentChannel()">Leave</button>
          <button class="close-btn" @click="switchToView('global')" title="Back to global chat">&times;</button>
        </div>

        <!-- Messages -->
        <div class="messages" id="messages-container">
          <template x-for="msg in currentMessages" :key="msg.id || msg.time">
            <div 
              class="msg"
              :class="{ 
                'dm': msg.isDm, 
                'system': msg.isSystem, 
                'error': msg.isError 
              }"
            >
              <template x-if="!msg.isSystem && !msg.isError">
                <span class="time" x-text="formatTime(msg.time)"></span>
              </template>
              
              <template x-if="msg.isDm">
                <span class="dm-tag">DM</span>
              </template>
              
              <template x-if="!msg.isSystem && !msg.isError">
                <span 
                  class="author"
                  :class="'author-' + getAuthorColor(msg.author)"
                  x-text="msg.authorDisplay + ':'"
                ></span>
              </template>
              
              <span class="text" x-text="msg.text"></span>
            </div>
          </template>
        </div>

        <!-- Input -->
        <div id="input-area">
          <input 
            type="text" 
            id="msg-input"
            x-model="messageInput"
            @keydown.enter="sendMessage()"
            :placeholder="inputPlaceholder"
            :disabled="!connected"
          >
          <button 
            id="send-btn" 
            @click="sendMessage()"
            :disabled="!connected || !messageInput.trim()"
          >
            Send
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    function chatApp() {
      return {
        // State
        ws: null,
        myName: '',
        joinName: '',
        joining: false,
        joinError: '',
        joined: false,
        connected: false,
        connectionState: 'disconnected',
        agents: [],
        messages: [],
        dmMessages: [],
        channelMessages: {},
        dmTarget: null,
        currentView: 'global',
        channels: [],
        joinedChannels: new Set(),
        unreadChannels: new Set(),
        messageInput: '',
        showCreateChannel: false,
        newChannelName: '',
        sidebarOpen: false,
        authorColors: new Map(),
        colorIndex: 0,
        reconnectTimer: null,
        reconnectDelay: 1000,

        // Computed
        get connectionText() {
          if (this.connectionState === 'connected') return 'Connected';
          if (this.connectionState === 'reconnecting') return 'Reconnecting...';
          return 'Disconnected';
        },

        get sortedAgents() {
          return [...this.agents].sort((a, b) => {
            if (a === this.myName) return -1;
            if (b === this.myName) return 1;
            return a.localeCompare(b);
          });
        },

        get currentMessages() {
          if (this.dmTarget) {
            return this.dmMessages.filter(m => 
              (m.from === this.dmTarget && m.to === this.myName) ||
              (m.from === this.myName && m.to === this.dmTarget)
            );
          }
          if (this.currentView === 'global') {
            return this.messages;
          }
          return this.channelMessages[this.currentView] || [];
        },

        get inputPlaceholder() {
          if (this.dmTarget) return `DM to ${this.dmTarget}...`;
          if (this.currentView !== 'global') return `Message #${this.currentView}...`;
          return 'Type a message... (/dm name message for DMs)';
        },

        get currentChannelMembersText() {
          if (this.currentView === 'global') return '';
          const ch = this.channels.find(c => c.name === this.currentView);
          return ch ? `${ch.members.length} members` : '';
        },

        // Methods
        init() {
          this.connect();
        },

        connect() {
          const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
          this.ws = new WebSocket(protocol + '//' + window.location.host + '/ws');

          this.ws.addEventListener('open', () => {
            this.connectionState = 'connected';
            this.connected = true;
            this.reconnectDelay = 1000;
            
            if (this.myName) {
              this.ws.send(JSON.stringify({ type: 'join', name: this.myName }));
              this.ws.send(JSON.stringify({ type: 'list_channels' }));
            }
          });

          this.ws.addEventListener('message', (event) => {
            try {
              const msg = JSON.parse(event.data);
              this.handleMessage(msg);
            } catch {}
          });

          this.ws.addEventListener('close', () => {
            this.connectionState = 'reconnecting';
            this.connected = false;
            this.scheduleReconnect();
          });

          this.ws.addEventListener('error', () => {});
        },

        scheduleReconnect() {
          if (this.reconnectTimer) return;
          this.reconnectTimer = setTimeout(() => {
            this.reconnectTimer = null;
            if (!this.ws || this.ws.readyState === WebSocket.CLOSED) {
              this.connect();
            }
          }, this.reconnectDelay);
          this.reconnectDelay = Math.min(this.reconnectDelay * 1.5, 10000);
        },

        doJoin() {
          const name = this.joinName.trim();
          if (!name) {
            this.joinError = 'Please enter a name';
            return;
          }

          this.joining = true;
          this.joinError = '';
          this.myName = name;

          if (this.ws && this.ws.readyState === WebSocket.OPEN) {
            this.ws.send(JSON.stringify({ type: 'join', name: this.myName }));
          } else {
            this.connect();
          }
        },

        handleMessage(msg) {
          switch (msg.type) {
            case 'joined':
              this.agents = msg.names || [];
              if (msg.name === this.myName && !this.joined) {
                this.joined = true;
                this.joining = false;
                this.ws.send(JSON.stringify({ type: 'list_channels' }));
                this.$nextTick(() => document.getElementById('msg-input')?.focus());
              } else if (msg.name !== this.myName) {
                this.messages.push({
                  isSystem: true,
                  text: `${msg.name} joined the chat`,
                  time: Date.now(),
                  id: 'join-' + msg.name + Date.now()
                });
              }
              break;

            case 'left':
              this.agents = this.agents.filter(n => n !== msg.name);
              this.messages.push({
                isSystem: true,
                text: `${msg.name} left the chat`,
                time: Date.now(),
                id: 'leave-' + msg.name + Date.now()
              });
              if (this.dmTarget === msg.name) {
                this.exitDmMode();
              }
              break;

            case 'message':
              this.messages.push({
                author: msg.from,
                authorDisplay: msg.from,
                text: msg.text,
                time: msg.time,
                id: msg.time + '-' + msg.from
              });
              break;

            case 'dm':
              this.dmMessages.push({
                from: msg.from,
                to: this.myName,
                author: msg.from,
                authorDisplay: msg.from === this.myName ? `you → ${msg.from}` : `${msg.from} → you`,
                text: msg.text,
                time: msg.time,
                isDm: true,
                id: 'dm-' + msg.time
              });
              break;

            case 'history':
              this.messages = (msg.messages || []).map(m => ({
                author: m.from,
                authorDisplay: m.type === 'dm' 
                  ? (m.from === this.myName ? `you → ${m.to}` : `${m.from} → ${m.to}`)
                  : m.from,
                text: m.text,
                time: m.time,
                isDm: m.type === 'dm',
                id: 'hist-' + m.time
              }));
              break;

            case 'channels_list':
              this.channels = msg.channels || [];
              this.joinedChannels.clear();
              for (const ch of this.channels) {
                if (ch.members.includes(this.myName)) {
                  this.joinedChannels.add(ch.name);
                }
              }
              break;

            case 'channel_created':
              if (!this.channels.find(c => c.name === msg.channel)) {
                this.channels.push({ name: msg.channel, members: [msg.by] });
              }
              this.messages.push({
                isSystem: true,
                text: `${msg.by} created channel #${msg.channel}`,
                time: Date.now(),
                id: 'ch-create-' + msg.channel
              });
              break;

            case 'channel_joined':
              const chIdx = this.channels.findIndex(c => c.name === msg.channel);
              if (chIdx >= 0) {
                this.channels[chIdx].members = msg.members;
              } else {
                this.channels.push({ name: msg.channel, members: msg.members });
              }
              
              if (msg.name === this.myName) {
                this.joinedChannels.add(msg.channel);
                this.switchToView(msg.channel);
                this.ws.send(JSON.stringify({ type: 'read_channel', channel: msg.channel }));
              } else {
                if (!this.channelMessages[msg.channel]) {
                  this.channelMessages[msg.channel] = [];
                }
                this.channelMessages[msg.channel].push({
                  isSystem: true,
                  text: `${msg.name} joined #${msg.channel}`,
                  time: Date.now(),
                  id: 'ch-join-' + msg.name + Date.now()
                });
              }
              break;

            case 'channel_left':
              const ch = this.channels.find(c => c.name === msg.channel);
              if (ch) {
                ch.members = ch.members.filter(n => n !== msg.name);
              }
              
              if (msg.name === this.myName) {
                this.joinedChannels.delete(msg.channel);
                if (this.currentView === msg.channel) {
                  this.switchToView('global');
                }
              } else {
                if (this.channelMessages[msg.channel]) {
                  this.channelMessages[msg.channel].push({
                    isSystem: true,
                    text: `${msg.name} left #${msg.channel}`,
                    time: Date.now(),
                    id: 'ch-leave-' + msg.name + Date.now()
                  });
                }
              }
              break;

            case 'channel_message':
              if (!this.channelMessages[msg.channel]) {
                this.channelMessages[msg.channel] = [];
              }
              this.channelMessages[msg.channel].push({
                author: msg.from,
                authorDisplay: msg.from,
                text: msg.text,
                time: msg.time,
                id: 'ch-msg-' + msg.time
              });
              
              if (this.currentView !== msg.channel) {
                this.unreadChannels.add(msg.channel);
              }
              break;

            case 'channel_notification':
              if (this.currentView === msg.channel) {
                this.ws.send(JSON.stringify({ type: 'read_channel', channel: msg.channel }));
              } else {
                this.unreadChannels.add(msg.channel);
              }
              break;

            case 'channel_messages':
              this.channelMessages[msg.channel] = (msg.messages || []).map(m => ({
                author: m.from,
                authorDisplay: m.from,
                text: m.text,
                time: m.time,
                id: 'ch-hist-' + m.time
              }));
              break;

            case 'error':
              if (!this.joined) {
                this.joinError = msg.message;
                this.joining = false;
              } else {
                this.messages.push({
                  isError: true,
                  text: 'Error: ' + msg.message,
                  time: Date.now(),
                  id: 'err-' + Date.now()
                });
              }
              break;
          }
        },

        sendMessage() {
          const raw = this.messageInput.trim();
          if (!raw || !this.connected) return;

          // Check for /dm command
          const dmMatch = raw.match(/^\/dm\s+(\S+)\s+([\s\S]+)$/);
          if (dmMatch) {
            const to = dmMatch[1];
            const text = dmMatch[2].trim();
            if (text) {
              this.ws.send(JSON.stringify({ type: 'dm', to, text }));
              this.dmMessages.push({
                from: this.myName,
                to,
                author: this.myName,
                authorDisplay: `you → ${to}`,
                text,
                time: Date.now(),
                isDm: true,
                id: 'dm-out-' + Date.now()
              });
            }
            this.messageInput = '';
            return;
          }

          // DM mode
          if (this.dmTarget) {
            this.ws.send(JSON.stringify({ type: 'dm', to: this.dmTarget, text: raw }));
            this.dmMessages.push({
              from: this.myName,
              to: this.dmTarget,
              author: this.myName,
              authorDisplay: `you → ${this.dmTarget}`,
              text: raw,
              time: Date.now(),
              isDm: true,
              id: 'dm-out-' + Date.now()
            });
            this.messageInput = '';
            return;
          }

          // Channel message
          if (this.currentView !== 'global') {
            this.ws.send(JSON.stringify({ type: 'channel_message', channel: this.currentView, text: raw }));
            this.messageInput = '';
            return;
          }

          // Global message
          this.ws.send(JSON.stringify({ type: 'message', text: raw }));
          this.messageInput = '';
        },

        enterDmMode(name) {
          if (this.currentView !== 'global') {
            this.switchToView('global');
          }
          this.dmTarget = name;
          this.sidebarOpen = false;
          this.$nextTick(() => document.getElementById('msg-input')?.focus());
        },

        exitDmMode() {
          this.dmTarget = null;
          this.$nextTick(() => document.getElementById('msg-input')?.focus());
        },

        switchToView(view) {
          if (view === this.currentView) return;
          
          if (this.dmTarget) {
            this.exitDmMode();
          }
          
          this.currentView = view;
          this.unreadChannels.delete(view);
          this.sidebarOpen = false;
          this.$nextTick(() => document.getElementById('msg-input')?.focus());
        },

        isJoined(channelName) {
          return this.joinedChannels.has(channelName);
        },

        joinChannel(name) {
          this.ws.send(JSON.stringify({ type: 'join_channel', channel: name }));
        },

        createChannel() {
          const name = this.newChannelName.trim().toLowerCase().replace(/[^a-z0-9_-]/g, '');
          if (name) {
            this.ws.send(JSON.stringify({ type: 'create_channel', channel: name }));
            this.newChannelName = '';
            this.showCreateChannel = false;
          }
        },

        leaveCurrentChannel() {
          if (this.currentView !== 'global') {
            this.ws.send(JSON.stringify({ type: 'leave_channel', channel: this.currentView }));
          }
        },

        formatTime(ts) {
          const d = new Date(ts);
          return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
        },

        getAuthorColor(name) {
          if (!this.authorColors.has(name)) {
            this.authorColors.set(name, this.colorIndex % 8);
            this.colorIndex++;
          }
          return this.authorColors.get(name);
        }
      };
    }
  </script>
